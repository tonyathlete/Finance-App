
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoBudget.ca — Analysez votre budget gratuitement</title>
    <meta name="description" content="Découvrez où va votre argent chaque mois. Obtenez une analyse gratuite de votre budget en 3 minutes.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes scaleUp {
        from { transform: scale(0.95); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }
      @keyframes floatSlow {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      .animate-fadeIn { animation: fadeIn 0.35s ease-out; }
      .animate-scaleUp { animation: scaleUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
      .animate-floatSlow { animation: floatSlow 6s ease-in-out infinite; }

      body { font-family: 'Inter', sans-serif; }
      .font-display { font-family: 'Sora', sans-serif; }

      .bg-mesh {
        background-image:
          radial-gradient(at 0% 0%, rgba(59,130,246,0.10) 0px, transparent 50%),
          radial-gradient(at 100% 0%, rgba(99,102,241,0.10) 0px, transparent 50%),
          radial-gradient(at 100% 100%, rgba(34,211,238,0.08) 0px, transparent 50%);
      }
      .card-elevated {
        box-shadow: 0 1px 2px rgba(30,58,138,0.04), 0 8px 24px -8px rgba(30,58,138,0.10);
      }
      .card-elevated:hover {
        box-shadow: 0 2px 4px rgba(30,58,138,0.06), 0 16px 32px -12px rgba(30,58,138,0.14);
      }

      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #fffbeb; }
      ::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 3px; }
    </style>

</head>

</html>
